## Publishes site/ to GitHub Pages. Pages is enabled automatically on the first
## run (configure-pages `enablement: true` + the `pages: write` permission
## below) — no manual Settings step needed. If an org policy blocks programmatic
## enablement, set it once: Settings → Pages → Source: GitHub Actions.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true      # enable Pages (build_type=workflow) if not already
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
