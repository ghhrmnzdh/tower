## Publishes the site/ folder to the gh-pages branch, which GitHub Pages serves
## (Settings → Pages → Source: Deploy from a branch → gh-pages / root — already set).
##
## Uses a plain git push, NOT actions/deploy-pages: that action kept failing on
## this repo with "Deployment failed, try again later" even though GitHub Pages
## was operational. Pushing site/ straight to gh-pages triggers Pages' own
## (rock-solid) static build. No third-party actions. Every push touching site/
## republishes; run it by hand from the Actions tab via "Run workflow".
name: Publish site to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site/ to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          cp -R site/. "$work"/
          rm -f "$work/README.md"          # dev notes, not part of the public site
          rm -f "$work/og.html"            # source for og.png — rendered, not served
          rm -f "$work/og-fa.html"         # source for og-fa.png — rendered, not served
          rm -f "$work/icon.html"          # source for apple-touch-icon.png
          touch "$work/.nojekyll"          # serve files verbatim, skip Jekyll
          cd "$work"
          git init -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish site @ ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
